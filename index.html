<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial de Verificación Estudiantil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#204E99;
    --navy:#204E99;
    --paper:#FAF7F0;
    --paper-dim:#F0EBDF;
    --ink:#1A1A1A;
    --muted:#6B7280;
    --line:#D9D2BF;
    --red:#A6192E;
    --gold:#B08D57;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(23,61,115,0.06), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(166,25,46,0.05), transparent 45%),
      var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    /* align-items:center;
    justify-content:center; */
    /* padding:32px 16px; */
  }

  /* subtle guilloché-style security pattern, like certificate/banknote paper */
  /* .field{
    position:fixed;
    inset:0;
    z-index:-1;
    opacity:0.35;
    background-image:
      repeating-linear-gradient(115deg, rgba(23,61,115,0.035) 0px, rgba(23,61,115,0.035) 1px, transparent 1px, transparent 14px),
      repeating-linear-gradient(25deg, rgba(166,25,46,0.03) 0px, rgba(166,25,46,0.03) 1px, transparent 1px, transparent 14px);
  } */

  .card{
    position:relative;
    width:100%;
    max-width:100%;
    background:#fff;
    overflow:hidden;
    box-shadow:0 1px 2px rgba(15,37,71,0.06), 0 20px 45px -18px rgba(15,37,71,0.35);
    border:1px solid var(--line);
  }

  /* ---------- header / institution ---------- */
  .header{
    background:linear-gradient(135deg, var(--navy-deep), var(--navy) 70%);
    padding:22px 20px 20px;
    display:flex;
    align-items:center;
    gap:14px;
    position:relative;
  }
  .crest{
    width:52px;height:52px;
    border-radius:50%;
    background:var(--paper);
    display:flex;align-items:center;justify-content:center;
    border:2px solid var(--gold);
    flex-shrink:0;
  }
  .crest svg{width:30px;height:30px;}
  .inst-name{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:1.15rem;
    color:#fff;
    line-height:1.15;
  }
  .inst-tag{
    font-size:0.66rem;
    letter-spacing:0.09em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.65);
    margin-top:3px;
  }
  .header::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:-3px;
    height:3px;
    background:var(--red);
  }

  /* ---------- identity block ---------- */
  .identity{
    padding:26px 22px 20px;
    text-align:center;
  }
  .name{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.5rem;
    line-height:1.2;
    color:var(--navy-deep);
  }
  .meta-row{
    margin-top:14px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .meta-item{
    font-size:0.85rem;
    color:var(--muted);
  }
  .meta-item span{
    font-family:'IBM Plex Mono', monospace;
    color:var(--ink);
    font-weight:600;
    letter-spacing:0.02em;
  }
  .blood{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:12px;
    padding:5px 12px;
    border-radius:999px;
    background:rgba(166,25,46,0.08);
    border:1px solid rgba(166,25,46,0.25);
    font-size:0.78rem;
    font-weight:600;
    color:var(--red);
  }

  /* ---------- faculty banner ---------- */
  .banner{
    background:var(--navy);
    color:#fff;
    text-align:center;
    padding:14px 18px;
    font-weight:600;
    font-size:0.95rem;
    letter-spacing:0.01em;
    line-height:1.35;
  }

  /* ---------- photo ---------- */
  .photo-wrap{
    padding:24px;
    display:flex;
    justify-content:center;
    position:relative;
  }
  .photo{
    width:190px;
    height:230px;
    border-radius:6px;
    border:3px solid var(--red);
    background:linear-gradient(160deg, #E7E2D4, #D8D2C1);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .photo svg{width:72%;height:72%;color:#A79E8A;}

  /* verified seal, the signature element */
  .seal{
    position:absolute;
    right:26px;
    bottom:14px;
    width:74px;height:74px;
    border-radius:50%;
    background:var(--paper);
    border:2px solid var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    transform:rotate(-12deg);
    box-shadow:0 6px 14px -4px rgba(15,37,71,0.35);
  }
  .seal-inner{
    width:60px;height:60px;
    border-radius:50%;
    border:1px dashed var(--red);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
  }
  .seal-inner svg{width:20px;height:20px;color:var(--red);}
  .seal-text{
    font-size:0.5rem;
    font-weight:700;
    letter-spacing:0.06em;
    color:var(--navy-deep);
    text-transform:uppercase;
  }

  /* ---------- footer ---------- */
  .footer{
    padding:16px 22px 22px;
    text-align:center;
    border-top:1px solid var(--line);
    background:var(--paper-dim);
  }
  .footer-label{
    font-size:0.68rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .footer-code{
    margin-top:5px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    color:var(--navy-deep);
    font-weight:600;
    word-break:break-all;
  }

  /* ---------- perforated edge, ties card to "credential" feel ---------- */
  .perf{
    height:14px;
    background-image:radial-gradient(circle, var(--paper) 3px, transparent 3.5px);
    background-size:16px 16px;
    background-position:center;
    background-color:#fff;
  }

  /* ---------- desktop layout ---------- */
  @media (min-width:860px){
    .card{
      max-width:760px;
      display:grid;
      grid-template-columns:280px 1fr;
      grid-template-rows:auto 1fr auto;
    }
    .header{grid-column:1 / -1;}
    .photo-wrap{
      grid-column:1;
      grid-row:2 / 4;
      background:var(--paper-dim);
      border-right:1px solid var(--line);
      align-items:flex-start;
      padding-top:34px;
    }
    .photo{width:100%;height:280px;}
    .identity{grid-column:2;grid-row:2;text-align:left;padding:30px 30px 10px;}
    .name{font-size:1.9rem;}
    .meta-row{flex-direction:row;gap:28px;flex-wrap:wrap;}
    .blood{margin-top:16px;}
    .banner{grid-column:2;grid-row:3;text-align:left;align-self:start;}
    .footer{grid-column:1 / -1;text-align:left;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .perf{display:none;}
    .seal{right:auto;left:210px;bottom:20px;}
  }
</style>
</head>
<body>
<!-- <div class="field"></div> -->

<div class="card">

  <div class="header">
    <div class="crest">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#173D73" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M6 10v6c0 1.5 2.7 3 6 3s6-1.5 6-3v-6" stroke="#173D73" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="inst-name">Institución Educativa</div>
      <div class="inst-tag">Verificación de credencial</div>
    </div>
  </div>

  <div class="identity">
    <div class="name">NOMBRE APELLIDO</div>
    <div class="meta-row">
      <div class="meta-item">Cédula / Pasaporte: <span>0000000000</span></div>
      <div class="meta-item">Código estudiantil: <span>UT-0000-000</span></div>
    </div>
    <div class="blood">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C12 2 6 10 6 14.5C6 18.09 8.69 21 12 21C15.31 21 18 18.09 18 14.5C18 10 12 2 12 2Z" stroke="currentColor" stroke-width="1.6"/></svg>
      Tipo de sangre: O+
    </div>
  </div>

  <div class="banner">Facultad / Carrera</div>

  <div class="photo-wrap">
    <div class="photo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="seal">
      <div class="seal-inner">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="seal-text">Válido</span>
      </div>
    </div>
  </div>

  <div class="perf"></div>

  <div class="footer">
    <div>
      <div class="footer-label">Documento generado el</div>
      <div class="footer-code" id="fecha">--/--/----</div>
    </div>
    <div>
      <div class="footer-label">Código de verificación</div>
      <div class="footer-code">VERIF-XXXX-XXXX</div>
    </div>
  </div>

</div>

<script>
  const hoy = new Date();
  document.getElementById('fecha').textContent = hoy.toLocaleDateString('es-EC', { day:'2-digit', month:'2-digit', year:'numeric' });
</script>
</body>
</html>
